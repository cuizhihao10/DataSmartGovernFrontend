# DataSmart Govern Frontend Nginx 配置。
#
# 设计目标：
# - 对浏览器暴露一个统一入口 `http://localhost:5173`；
# - 静态资源由 Nginx 直接返回，避免生产/演示环境依赖 Vite dev server；
# - 业务 API 保持前端代码里的 `/api` 相对路径，再由 Nginx 在容器网络内代理到 gateway；
# - React Router 的页面刷新、深链跳转、OIDC callback 路由都能回退到 index.html。

server {
    listen 80;
    server_name _;

    # Docker Compose 服务重建后容器 IP 可能变化。Nginx 默认只在启动时解析一次 proxy_pass
    # 中的服务名，随后会继续访问旧 IP，表现为整个前端突然出现 502，直到前端容器重启。
    # 127.0.0.11 是 Docker 内置 DNS；配合变量形式的 proxy_pass，让 gateway 地址按 TTL
    # 重新解析，从而使后端单独发布、重建或漂移时前端代理能够自动恢复。
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # 前端容器自身健康检查。这里只检查 Nginx/静态站点是否可用，
    # 不检查 gateway、Keycloak、PostgreSQL 等下游依赖，避免一个后端服务波动导致前端容器被误判为不健康。
    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"UP","component":"datasmart-frontend"}';
    }

    # Vite 构建后的资源文件名带 hash，可以给较长缓存；
    # index.html 不在这里命中，因此每次进入页面仍能拿到最新资源引用。
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 前端所有 API 请求都保留 `/api` 前缀转发给 gateway。
    # 这里不能 proxy_pass 到具体后端微服务，否则会绕过 gateway 的认证、鉴权、审计、限流与路由策略。
    location /api/ {
        set $gateway_upstream gateway:8080;
        proxy_pass http://$gateway_upstream$request_uri;
        proxy_http_version 1.1;

        # Host 与 Forwarded 头用于后端生成回调地址、日志追踪和排查来源。
        # 真实生产环境还会在网关/Ingress 层统一处理 HTTPS、真实客户端 IP 与安全 Header。
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 预留 WebSocket/SSE/长轮询类能力，例如后续 Agent 运行事件实时推送。
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # React Router 使用浏览器端路由，刷新 `/login`、`/auth/callback`、`/sync/tasks/...`
    # 时 Nginx 本地并没有这些物理文件，因此必须回退到 index.html 交给前端路由接管。
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
